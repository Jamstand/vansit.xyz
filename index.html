<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scene</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Furore';
      src: url('Furore.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none;
    }

    :root {
      --primary: #8b5cf6;
      --primary-glow: rgba(139, 92, 246, 0.5);
      --secondary: #a78bfa;
      --accent: #c4b5fd;
      --bg-card: rgba(10, 10, 20, 0.55);
      --border: rgba(139, 92, 246, 0.25);
      --text: #e2e8f0;
      --text-dim: rgba(226, 232, 240, 0.5);
      --live: #ef4444;
      --live-glow: rgba(239, 68, 68, 0.5);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
      font-family: 'Furore', sans-serif;
      color: var(--text);
    }

    /* Custom Crosshair Cursor */
    .cursor {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 10000;
      width: 30px;
      height: 30px;
      will-change: transform;
    }

    .cursor::before, .cursor::after {
      content: '';
      position: absolute;
      background: var(--primary);
      box-shadow: 0 0 6px var(--primary-glow), 0 0 12px var(--primary-glow);
    }

    .cursor::before {
      width: 1.5px;
      height: 30px;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
    }

    .cursor::after {
      width: 30px;
      height: 1.5px;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
    }

    .cursor-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 10001;
      box-shadow: 0 0 8px var(--primary), 0 0 20px var(--primary-glow);
      will-change: transform;
    }

    .cursor.hover {
      transform: scale(1.5);
    }

    .cursor.hover::before, .cursor.hover::after {
      background: var(--accent);
    }

    /* Cursor Trail */
    .trail-dot {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 6px var(--primary-glow);
      opacity: 0;
      will-change: transform, opacity;
    }

    /* Click Ripple */
    .click-ripple {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      border: 1px solid var(--primary);
      border-radius: 50%;
      animation: ripple-expand 0.6s ease-out forwards;
    }

    @keyframes ripple-expand {
      0% { width: 0; height: 0; opacity: 0.8; transform: translate(-50%, -50%); }
      100% { width: 80px; height: 80px; opacity: 0; transform: translate(-50%, -50%); }
    }

    /* Click Burst Particles */
    .burst-particle {
      position: fixed;
      pointer-events: none;
      z-index: 9997;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 4px var(--primary-glow);
    }

    /* Video Background */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -2;
      opacity: 0;
      transition: opacity 1.5s ease;
      will-change: transform, opacity;
    }

    .video-bg.loaded {
      opacity: 1;
    }

    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
      z-index: -1;
      transition: background 0.5s ease;
    }

    .vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      box-shadow: inset 0 0 200px rgba(0, 0, 0, 0.8);
      z-index: -1;
      pointer-events: none;
    }

    /* Start Screen */
    .start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }

    .start-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Start screen ambient particles */
    .start-particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--primary);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--primary-glow);
      animation: start-float linear infinite;
      opacity: 0;
    }

    @keyframes start-float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }

    .start-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
    }

    .start-logo {
      font-family: 'Furore', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 12px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--text), var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 30px;
      animation: logo-glow 3s ease-in-out infinite;
      text-shadow: none;
    }

    @keyframes logo-glow {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.3)); }
      50% { filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.6)); }
    }

    .start-ring {
      width: 80px;
      height: 80px;
      border: 2px solid transparent;
      border-top-color: var(--primary);
      border-right-color: var(--accent);
      border-radius: 50%;
      animation: spin-ring 2s linear infinite;
      margin-bottom: 30px;
      position: relative;
    }

    .start-ring::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid transparent;
      border-bottom-color: var(--secondary);
      border-left-color: var(--primary);
      border-radius: 50%;
      animation: spin-ring 1.5s linear infinite reverse;
    }

    .start-ring::after {
      content: '▶';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 1.2rem;
      animation: pulse-text 2s ease-in-out infinite;
    }

    .start-text {
      font-family: 'Furore', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--text-dim);
      animation: pulse-text 2s ease-in-out infinite;
    }

    .start-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      margin-top: 16px;
      animation: expand-line 2s ease-in-out infinite;
    }

    .start-hint {
      font-family: 'Furore', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 4px;
      color: rgba(139, 92, 246, 0.3);
      margin-top: 40px;
      text-transform: uppercase;
    }

    /* Splash flash layers */
    .splash-flash {
      position: fixed;
      inset: 0;
      z-index: 9998;
      pointer-events: none;
    }

    /* Shockwave rings */
    .shockwave {
      position: fixed;
      border-radius: 50%;
      border: 2px solid;
      pointer-events: none;
      z-index: 10000;
      transform: translate(-50%, -50%);
    }

    /* Splash particles */
    .splash-particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 10001;
    }

    @keyframes pulse-text {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes expand-line {
      0%, 100% { width: 60px; }
      50% { width: 120px; }
    }

    /* Main Container */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      opacity: 0;
      z-index: 1;
      perspective: 1200px;
      transition: opacity 0.5s ease 0.2s;
    }

    .container.visible {
      opacity: 1;
    }

    .container.visible .social-link {
      animation: button-entrance 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, button-glow-pulse 3s ease-in-out infinite 0.8s, button-float 4s ease-in-out infinite 0.8s;
      opacity: 0;
      transform: translateY(20px) scale(0.5);
    }

    .container.visible .social-link:nth-child(1) { animation-delay: 0.2s, 1s, 1s; }
    .container.visible .social-link:nth-child(2) { animation-delay: 0.35s, 1.15s, 1.15s; }
    .container.visible .social-link:nth-child(3) { animation-delay: 0.5s, 1.3s, 1.3s; }
    .container.visible .social-link:nth-child(4) { animation-delay: 0.65s, 1.45s, 1.45s; }

    .container.visible .server-button {
      animation: server-btn-entrance 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.9s forwards, server-glow-pulse 3s ease-in-out infinite 1.6s;
      opacity: 0;
      transform: translateY(15px) scale(0.7);
    }

    @keyframes button-entrance {
      0% { opacity: 0; transform: translateY(20px) scale(0.5); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Profile Card */
    .profile-card {
      background: rgba(14, 14, 20, 0.25);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(139, 92, 246, 0.1);
      border-radius: 22px;
      padding: 40px 50px;
      text-align: center;
      position: relative;
      overflow: visible;
      min-width: 380px;
      max-width: 420px;
      transition: transform 0.1s ease;
      transform-style: preserve-3d;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.1), 0 0 80px rgba(139, 92, 246, 0.05);
      animation: card-breathe 5s ease-in-out infinite;
      opacity: 1;
      transform: perspective(1200px) scale(1);
      transform-origin: center center;
    }

    .container.visible .profile-card {
      animation: card-breathe 5s ease-in-out infinite;
    }

    @keyframes card-pop-in {
      0% {
        opacity: 0;
        transform: perspective(1200px) scale(0) rotateY(180deg) rotateX(20deg) translateZ(-200px);
        box-shadow: 0 0 0 rgba(139, 92, 246, 0);
        filter: blur(20px) brightness(0);
      }
      15% {
        opacity: 0.3;
        transform: perspective(1200px) scale(0.15) rotateY(140deg) rotateX(15deg) translateZ(-100px);
        filter: blur(15px) brightness(0.5);
      }
      30% {
        opacity: 0.7;
        transform: perspective(1200px) scale(0.5) rotateY(80deg) rotateX(8deg) translateZ(-50px);
        filter: blur(8px) brightness(1.2);
      }
      45% {
        opacity: 1;
        transform: perspective(1200px) scale(1.12) rotateY(-15deg) rotateX(-3deg) translateZ(0);
        box-shadow: 0 0 100px rgba(139, 92, 246, 0.6), 0 0 200px rgba(139, 92, 246, 0.3), inset 0 0 30px rgba(139, 92, 246, 0.1);
        filter: blur(0px) brightness(1.5);
      }
      58% {
        transform: perspective(1200px) scale(0.96) rotateY(8deg) rotateX(2deg);
        box-shadow: 0 0 70px rgba(139, 92, 246, 0.4), 0 0 140px rgba(139, 92, 246, 0.15);
        filter: blur(0px) brightness(1.1);
      }
      70% {
        transform: perspective(1200px) scale(1.04) rotateY(-4deg) rotateX(-1deg);
        filter: brightness(1);
      }
      82% {
        transform: perspective(1200px) scale(0.99) rotateY(2deg);
      }
      92% {
        transform: perspective(1200px) scale(1.01) rotateY(-0.5deg);
      }
      100% {
        opacity: 1;
        transform: perspective(1200px) scale(1) rotateY(0deg) rotateX(0deg) translateZ(0);
        box-shadow: 0 0 40px rgba(139, 92, 246, 0.1), 0 0 80px rgba(139, 92, 246, 0.05);
        filter: blur(0px) brightness(1);
      }
    }

    @keyframes card-breathe {
      0%, 100% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.1), 0 0 80px rgba(139, 92, 246, 0.05); }
      50% { box-shadow: 0 0 60px rgba(139, 92, 246, 0.15), 0 0 120px rgba(139, 92, 246, 0.08); }
    }

    /* Primary flowing border — intense upfold effect */
    .profile-card::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 24px;
      background: conic-gradient(
        from var(--border-angle, 0deg),
        transparent 5%,
        var(--primary) 12%,
        var(--accent) 18%,
        #fff 22%,
        var(--secondary) 26%,
        var(--primary) 32%,
        transparent 40%,
        transparent 55%,
        var(--secondary) 62%,
        var(--accent) 68%,
        #fff 72%,
        var(--primary) 78%,
        transparent 85%
      );
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      mask-composite: exclude;
      padding: 2.5px;
      animation: spin-border 2s linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    /* Secondary glow trail — intense outer bloom */
    .profile-card::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 28px;
      background: conic-gradient(
        from var(--border-angle2, 180deg),
        transparent 15%,
        rgba(139, 92, 246, 0.7) 25%,
        rgba(167, 139, 250, 1) 30%,
        rgba(255, 255, 255, 0.6) 33%,
        rgba(139, 92, 246, 0.7) 38%,
        transparent 48%,
        transparent 65%,
        rgba(139, 92, 246, 0.5) 75%,
        rgba(167, 139, 250, 0.8) 80%,
        transparent 90%
      );
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      mask-composite: exclude;
      padding: 6px;
      animation: spin-border-reverse 3s linear infinite;
      pointer-events: none;
      filter: blur(8px);
      z-index: 0;
    }

    @keyframes spin-border {
      to { --border-angle: 360deg; }
    }

    @keyframes spin-border-reverse {
      to { --border-angle2: -180deg; }
    }

    @property --border-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    @property --border-angle2 {
      syntax: '<angle>';
      initial-value: 180deg;
      inherits: false;
    }

    .profile-card:hover::before {
      animation-duration: 1s;
      filter: brightness(1.5);
    }

    .profile-card:hover::after {
      animation-duration: 1.5s;
      filter: blur(10px) brightness(2);
    }

    .profile-card .glow {
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), var(--primary-glow), transparent 40%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 2;
    }

    .profile-card:hover .glow {
      opacity: 0.2;
    }

    /* Avatar */
    .avatar-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
      transition: transform 0.2s ease-out;
    }

    .avatar-container:hover {
      transform: scale(1.1);
    }

    .avatar-container:hover .avatar {
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--primary-glow);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      object-fit: cover;
      position: relative;
      z-index: 1;
      background: var(--bg-card);
      transition: all 0.3s ease;
    }

    .avatar-ring {
      position: absolute;
      top: -6px;
      left: -6px;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--primary);
      border-right-color: var(--secondary);
      animation: spin-ring 3s linear infinite;
    }

    @keyframes spin-ring {
      to { transform: rotate(360deg); }
    }

    .avatar-pulse {
      position: absolute;
      top: -4px;
      left: -4px;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 1px solid var(--primary);
      animation: avatar-pulse-anim 2s ease-in-out infinite;
    }

    @keyframes avatar-pulse-anim {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0; }
    }

    /* Glitch effect on avatar click */
    .avatar-container.glitch .avatar {
      animation: glitch-avatar 0.4s ease;
    }

    @keyframes glitch-avatar {
      0% { transform: translate(0); filter: hue-rotate(0deg); }
      20% { transform: translate(-3px, 2px); filter: hue-rotate(90deg); }
      40% { transform: translate(3px, -2px); filter: hue-rotate(180deg); }
      60% { transform: translate(-2px, -3px); filter: hue-rotate(270deg); }
      80% { transform: translate(2px, 3px); filter: hue-rotate(360deg); }
      100% { transform: translate(0); filter: hue-rotate(0deg); }
    }

    /* Username */
    .username {
      font-family: 'Furore', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
      letter-spacing: 3px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.2s ease-out;
      position: relative;
    }

    .username:hover {
      animation: username-glitch 0.3s ease infinite;
    }

    @keyframes username-glitch {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-2px, 1px); }
      40% { transform: translate(2px, -1px); }
      60% { transform: translate(-1px, -1px); }
      80% { transform: translate(1px, 2px); }
    }

    #usernameText {
      position: relative;
      color: #fff;
      text-shadow: 0 0 20px rgba(139, 92, 246, 0.6), 0 0 40px rgba(139, 92, 246, 0.3);
    }

    .verified-badge {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 6px rgba(29, 155, 240, 0.6));
      animation: badge-glow 2s ease-in-out infinite;
    }

    @keyframes badge-glow {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(29, 155, 240, 0.5)); }
      50% { filter: drop-shadow(0 0 10px rgba(29, 155, 240, 0.9)) drop-shadow(0 0 20px rgba(29, 155, 240, 0.4)); }
    }

    .username .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 1.4rem;
      background: var(--primary);
      margin-left: 2px;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      -webkit-text-fill-color: var(--primary);
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Live Status Badge */
    .live-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      transition: all 0.5s ease;
    }

    .live-status.live {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #f87171;
      box-shadow: 0 0 20px var(--live-glow);
      animation: live-pulse 2s ease-in-out infinite;
    }

    .live-status.offline {
      background: rgba(100, 116, 139, 0.15);
      border: 1px solid rgba(100, 116, 139, 0.3);
      color: #94a3b8;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    .live .live-dot {
      background: #ef4444;
      box-shadow: 0 0 8px var(--live-glow);
      animation: live-dot-pulse 1.5s ease-in-out infinite;
    }

    .offline .live-dot {
      background: #64748b;
    }

    @keyframes live-pulse {
      0%, 100% { box-shadow: 0 0 15px var(--live-glow); }
      50% { box-shadow: 0 0 30px var(--live-glow); }
    }

    @keyframes live-dot-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    /* Tags / Badges */
    .tags {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--secondary);
      background: rgba(139, 92, 246, 0.08);
      transition: all 0.3s ease;
    }

    .tag:hover {
      border-color: var(--primary);
      color: var(--text);
      background: rgba(139, 92, 246, 0.2);
      box-shadow: 0 0 15px var(--primary-glow);
      transform: scale(1.05);
    }

    /* Bio */
    .bio {
      font-size: 0.85rem;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 24px;
      min-height: 1.6em;
    }

    .bio .cursor-blink {
      display: inline-block;
      width: 1.5px;
      height: 0.85rem;
      background: var(--text-dim);
      margin-left: 1px;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
    }

    /* Social Links */
    .socials {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      transition: transform 0.2s ease-out;
    }

    .social-link {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      border: 1.5px solid var(--btn-color-dim);
      background: var(--btn-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--btn-color);
      text-decoration: none;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      gap: 3px;
      animation: button-glow-pulse 3s ease-in-out infinite, button-float 4s ease-in-out infinite;
      box-shadow: 0 0 10px var(--btn-glow), inset 0 0 15px var(--btn-bg);
      --btn-color: #9146ff;
      --btn-color-dim: rgba(145, 70, 255, 0.3);
      --btn-glow: rgba(145, 70, 255, 0.4);
      --btn-bg: rgba(145, 70, 255, 0.06);
      --btn-color-bright: #9146ff;
    }

    /* Twitch - Purple */
    .social-link[data-name="twitch"] {
      --btn-color: #9146ff;
      --btn-color-dim: rgba(145, 70, 255, 0.35);
      --btn-glow: rgba(145, 70, 255, 0.5);
      --btn-bg: rgba(145, 70, 255, 0.08);
      --btn-color-bright: #b380ff;
      animation-delay: 0s;
    }

    /* Discord - Blurple */
    .social-link[data-name="discord"] {
      --btn-color: #5865f2;
      --btn-color-dim: rgba(88, 101, 242, 0.35);
      --btn-glow: rgba(88, 101, 242, 0.5);
      --btn-bg: rgba(88, 101, 242, 0.08);
      --btn-color-bright: #7983f5;
      animation-delay: 0.3s;
    }

    /* YouTube - Red */
    .social-link[data-name="youtube"] {
      --btn-color: #ff0033;
      --btn-color-dim: rgba(255, 0, 51, 0.35);
      --btn-glow: rgba(255, 0, 51, 0.5);
      --btn-bg: rgba(255, 0, 51, 0.08);
      --btn-color-bright: #ff4466;
      animation-delay: 0.6s;
    }

    /* Discord Server - Big centered button */
    .server-button-wrap {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }

    .server-button {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 28px;
      border-radius: 14px;
      border: 1.5px solid rgba(88, 101, 242, 0.4);
      background: rgba(88, 101, 242, 0.1);
      color: #fff;
      text-decoration: none;
      font-family: 'Furore', sans-serif;
      font-size: 13px;
      letter-spacing: 1.5px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(88, 101, 242, 0.2), 0 0 30px rgba(88, 101, 242, 0.1);
    }

    .server-button::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, #5865f2, #7289da, transparent, transparent);
      animation: btn-border-spin 3s linear infinite;
      opacity: 0.5;
    }

    .server-button::after {
      content: '';
      position: absolute;
      inset: 1.5px;
      border-radius: 12.5px;
      background: rgba(14, 14, 20, 0.9);
      z-index: 0;
    }

    .server-btn-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      position: relative;
      z-index: 1;
      object-fit: cover;
      border: 2px solid rgba(88, 101, 242, 0.4);
      flex-shrink: 0;
    }

    .server-btn-info {
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      text-align: left;
      gap: 2px;
    }

    .server-btn-name {
      font-family: 'Furore', sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      color: #fff;
    }

    .server-btn-members {
      font-family: 'Furore', sans-serif;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .server-btn-members .online-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3ba55d;
      margin-right: 2px;
      box-shadow: 0 0 6px rgba(59, 165, 93, 0.6);
    }

    .server-btn-members .member-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #72767d;
      margin-right: 2px;
    }

    .server-btn-join {
      position: relative;
      z-index: 1;
      font-family: 'Furore', sans-serif;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: #5865f2;
      color: #fff;
      padding: 6px 16px;
      border-radius: 8px;
      margin-left: auto;
      transition: background 0.2s ease;
    }

    .server-button:hover {
      border-color: rgba(88, 101, 242, 0.8);
      box-shadow: 0 0 25px rgba(88, 101, 242, 0.4), 0 0 60px rgba(88, 101, 242, 0.2);
      transform: translateY(-2px) scale(1.03);
    }

    .server-button:hover::before {
      opacity: 0.9;
      animation-duration: 1.5s;
    }

    .server-button:hover .server-btn-join {
      background: #4752c4;
    }

    @keyframes server-btn-entrance {
      0% { opacity: 0; transform: translateY(15px) scale(0.7); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes server-glow-pulse {
      0%, 100% { box-shadow: 0 0 15px rgba(88, 101, 242, 0.2), 0 0 30px rgba(88, 101, 242, 0.1); }
      50% { box-shadow: 0 0 25px rgba(88, 101, 242, 0.4), 0 0 50px rgba(88, 101, 242, 0.2); }
    }

    /* TikTok - Cyan/Pink dual */
    .social-link[data-name="tiktok"] {
      --btn-color: #ff0050;
      --btn-color-dim: rgba(0, 242, 234, 0.25);
      --btn-glow: rgba(0, 242, 234, 0.4);
      --btn-bg: rgba(255, 0, 80, 0.06);
      --btn-color-bright: #00f2ea;
      animation-delay: 1.2s;
    }

    @keyframes button-glow-pulse {
      0%, 100% {
        box-shadow: 0 0 10px var(--btn-glow), 0 0 3px var(--btn-glow), inset 0 0 8px var(--btn-bg);
        border-color: var(--btn-color-dim);
      }
      50% {
        box-shadow: 0 0 22px var(--btn-glow), 0 0 44px var(--btn-glow), inset 0 0 12px var(--btn-bg);
        border-color: var(--btn-color);
      }
    }

    @keyframes button-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    /* Shimmer sweep effect */
    .social-link::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, var(--btn-glow), transparent, transparent);
      animation: btn-border-spin 4s linear infinite;
      opacity: 0.4;
    }

    .social-link::after {
      content: '';
      position: absolute;
      inset: 1.5px;
      border-radius: 14.5px;
      background: linear-gradient(145deg, rgba(20, 20, 30, 0.95), rgba(10, 10, 18, 0.98));
      z-index: 0;
    }

    @keyframes btn-border-spin {
      to { transform: rotate(360deg); }
    }

    .social-link:hover {
      border-color: var(--btn-color-bright);
      color: var(--btn-color-bright);
      box-shadow: 0 0 30px var(--btn-glow), 0 0 60px var(--btn-glow), 0 0 90px var(--btn-glow), inset 0 0 20px var(--btn-bg);
      animation: none;
      transform: translateY(-5px) scale(1.12);
    }

    .social-link:hover::before {
      opacity: 0.8;
      animation-duration: 1.5s;
    }

    .social-link:hover::after {
      background: linear-gradient(145deg, rgba(30, 30, 45, 0.95), rgba(15, 15, 25, 0.98));
    }

    .social-link svg {
      width: 20px;
      height: 20px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 0 5px var(--btn-glow));
      transition: filter 0.3s ease, transform 0.3s ease;
    }

    .social-link:hover svg {
      filter: drop-shadow(0 0 10px var(--btn-glow)) drop-shadow(0 0 20px var(--btn-glow));
      transform: scale(1.15);
    }

    /* Discord blurple/grey spinning border */
    .social-link[data-name="discord"]::before {
      background: conic-gradient(from 0deg, #5865f2, #888, #5865f2, transparent, #888, #5865f2);
      opacity: 0.7;
      animation: btn-border-spin 2.5s linear infinite;
    }
    .social-link[data-name="discord"]:hover::before {
      opacity: 1;
      animation-duration: 1s;
    }

    /* Twitch purple/grey spinning border */
    .social-link[data-name="twitch"]::before {
      background: conic-gradient(from 0deg, #9146ff, #888, #9146ff, transparent, #888, #9146ff);
      opacity: 0.7;
      animation: btn-border-spin 2.5s linear infinite;
    }
    .social-link[data-name="twitch"]:hover::before {
      opacity: 1;
      animation-duration: 1s;
    }

    /* YouTube red/white spinning border */
    .social-link[data-name="youtube"]::before {
      background: conic-gradient(from 0deg, #ff0000, #fff, #ff0000, transparent, #fff, #ff0000);
      opacity: 0.7;
      animation: btn-border-spin 2.5s linear infinite;
    }
    .social-link[data-name="youtube"]:hover::before {
      opacity: 1;
      animation-duration: 1s;
    }

    /* TikTok dual color spinning border */
    .social-link[data-name="tiktok"]::before {
      background: conic-gradient(from 0deg, #ff0050, #00f2ea, #ff0050, transparent, #00f2ea, #ff0050);
      opacity: 0.7;
      animation: btn-border-spin 2.5s linear infinite;
    }

    .social-link[data-name="tiktok"]:hover::before {
      opacity: 1;
      animation-duration: 1s;
    }

    /* TikTok dual color glow */
    .social-link[data-name="tiktok"] svg {
      filter: drop-shadow(0 0 4px rgba(255, 0, 80, 0.6)) drop-shadow(0 0 4px rgba(0, 242, 234, 0.6));
    }
    .social-link[data-name="tiktok"]:hover svg {
      filter: drop-shadow(0 0 10px rgba(255, 0, 80, 0.8)) drop-shadow(0 0 10px rgba(0, 242, 234, 0.8));
    }

    /* TikTok glowing ring - animated pulsing glow */
    .social-link[data-name="tiktok"] .tiktok-ring {
      position: absolute;
      inset: -4px;
      border-radius: 18px;
      pointer-events: none;
      z-index: -1;
      padding: 2px;
      background: linear-gradient(135deg, #ff0050, #00f2ea, #ff0050);
      background-size: 200% 200%;
      animation: tiktok-gradient-shift 2s ease-in-out infinite, tiktok-ring-pulse 2s ease-in-out infinite;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    .social-link[data-name="tiktok"] .tiktok-ring-glow {
      position: absolute;
      inset: -6px;
      border-radius: 20px;
      pointer-events: none;
      z-index: -2;
      animation: tiktok-ring-pulse 2s ease-in-out infinite;
      box-shadow:
        0 0 12px rgba(255, 0, 80, 0.5),
        0 0 24px rgba(0, 242, 234, 0.3);
    }

    @keyframes tiktok-gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes tiktok-ring-pulse {
      0%, 100% {
        opacity: 0.6;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.04);
      }
    }

    /* === ICON ANIMATIONS === */

    /* Twitch - chat bubble bounce */
    .social-link[data-name="twitch"] svg {
      animation: twitch-icon-pulse 2s ease-in-out infinite;
    }
    @keyframes twitch-icon-pulse {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1) rotate(-3deg); }
      75% { transform: scale(0.95) rotate(3deg); }
    }

    /* Discord - wobble/shake */
    .social-link[data-name="discord"] svg {
      animation: discord-icon-wobble 3s ease-in-out infinite;
    }
    @keyframes discord-icon-wobble {
      0%, 100% { transform: rotate(0deg); }
      15% { transform: rotate(5deg) scale(1.05); }
      30% { transform: rotate(-5deg) scale(1.05); }
      45% { transform: rotate(3deg); }
      60% { transform: rotate(-2deg); }
      75% { transform: rotate(0deg); }
    }

    /* YouTube - play button pulse with glow */
    .social-link[data-name="youtube"] svg {
      animation: youtube-icon-beat 2.5s ease-in-out infinite;
    }
    @keyframes youtube-icon-beat {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 3px rgba(255, 0, 51, 0.5)); }
      15% { transform: scale(1.15); filter: drop-shadow(0 0 10px rgba(255, 0, 51, 0.8)); }
      30% { transform: scale(0.95); filter: drop-shadow(0 0 3px rgba(255, 0, 51, 0.5)); }
      45% { transform: scale(1.08); filter: drop-shadow(0 0 8px rgba(255, 0, 51, 0.7)); }
      60% { transform: scale(1); }
    }

    /* TikTok - color shift glow */
    .social-link[data-name="tiktok"] svg {
      animation: tiktok-icon-glow 2.5s ease-in-out infinite;
    }
    @keyframes tiktok-icon-glow {
      0%, 100% {
        filter: drop-shadow(2px 0 0 rgba(255, 0, 80, 0.7)) drop-shadow(-2px 0 0 rgba(0, 242, 234, 0.7));
        transform: scale(1);
      }
      50% {
        filter: drop-shadow(-2px 0 0 rgba(255, 0, 80, 0.9)) drop-shadow(2px 0 0 rgba(0, 242, 234, 0.9)) drop-shadow(0 0 8px rgba(255, 0, 80, 0.4));
        transform: scale(1.08);
      }
    }

    /* Click Counter Badge */
    .click-count {
      font-size: 0.45rem;
      color: var(--btn-color);
      position: relative;
      z-index: 1;
      letter-spacing: 1px;
      opacity: 0.7;
      font-weight: 600;
      min-width: 12px;
      text-align: center;
      text-shadow: 0 0 6px var(--btn-glow);
    }

    /* Click animation */
    .social-link.clicked {
      animation: button-pop 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) !important;
    }

    @keyframes button-pop {
      0% { transform: scale(1); }
      30% { transform: scale(0.8); }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* +1 float animation */
    .click-float {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--btn-color-bright, var(--accent));
      pointer-events: none;
      animation: float-up 1s ease-out forwards;
      z-index: 10;
      text-shadow: 0 0 8px var(--btn-glow);
    }

    @keyframes float-up {
      0% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
      50% { opacity: 0.8; transform: translateX(-50%) translateY(-20px) scale(1.2); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(0.8); }
    }

    /* Tooltip */
    .social-link .tooltip {
      position: absolute;
      bottom: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(8px) scale(0.9);
      background: rgba(10, 10, 18, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid var(--btn-color-dim);
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 0.55rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--btn-color-bright, var(--secondary));
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 15px var(--btn-glow);
      z-index: 10;
    }

    .social-link .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: var(--btn-color-dim);
    }

    .social-link:hover .tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    /* Visitor Counter */
    .visitor-count {
      margin-top: 20px;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0.5;
    }

    .visitor-count span {
      color: var(--secondary);
      font-weight: 600;
    }

    /* Audio Controls */
    .audio-controls {
      position: fixed;
      bottom: 30px;
      right: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }

    .audio-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      position: relative;
      cursor: pointer;
    }

    .audio-btn:hover {
      border-color: var(--primary);
      color: var(--text);
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .audio-btn svg {
      width: 18px;
      height: 18px;
      transition: transform 0.3s ease, opacity 0.2s ease;
    }

    /* Mute animation */
    .audio-btn.muted svg {
      animation: mute-shake 0.4s ease;
    }

    .audio-btn.unmuted svg {
      animation: unmute-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes mute-shake {
      0% { transform: scale(1) rotate(0); }
      20% { transform: scale(0.8) rotate(-10deg); }
      40% { transform: scale(0.9) rotate(8deg); }
      60% { transform: scale(0.85) rotate(-5deg); }
      80% { transform: scale(0.95) rotate(2deg); }
      100% { transform: scale(1) rotate(0); }
    }

    @keyframes unmute-pop {
      0% { transform: scale(0.6); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* Mute pulse ring */
    .audio-btn .mute-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1.5px solid var(--primary);
      opacity: 0;
      pointer-events: none;
    }

    .audio-btn.muted .mute-ring {
      animation: mute-ring-pulse 1.5s ease-in-out infinite;
    }

    @keyframes mute-ring-pulse {
      0%, 100% { opacity: 0; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.15); }
    }

    /* Volume Slider */
    .volume-slider-wrap {
      display: flex;
      align-items: center;
      background: rgba(14, 14, 20, 0.8);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(139, 92, 246, 0.15);
      border-radius: 22px;
      padding: 6px 14px;
      gap: 8px;
      opacity: 0;
      width: 0;
      overflow: hidden;
      transition: opacity 0.4s ease, width 0.4s cubic-bezier(0.16, 1, 0.3, 1), padding 0.4s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .audio-controls:hover .volume-slider-wrap,
    .volume-slider-wrap.visible {
      opacity: 1;
      width: 120px;
      padding: 6px 14px;
      border-color: rgba(139, 92, 246, 0.3);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.1), inset 0 0 10px rgba(139, 92, 246, 0.05);
    }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 4px;
      border-radius: 4px;
      background: linear-gradient(to right, var(--primary) var(--vol, 40%), rgba(139, 92, 246, 0.1) var(--vol, 40%));
      outline: none;
      cursor: pointer;
      position: relative;
    }

    .volume-slider::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 4px;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #c4b5fd, var(--primary));
      box-shadow: 0 0 10px var(--primary-glow), 0 0 20px rgba(139, 92, 246, 0.2);
      cursor: pointer;
      margin-top: -6px;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .volume-slider::-webkit-slider-thumb:hover {
      transform: scale(1.4);
      box-shadow: 0 0 16px var(--primary-glow), 0 0 32px rgba(139, 92, 246, 0.3);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .volume-slider::-webkit-slider-thumb:active {
      transform: scale(1.2);
      background: radial-gradient(circle at 40% 40%, #e2d9fe, var(--accent));
    }

    .volume-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #c4b5fd, var(--primary));
      box-shadow: 0 0 10px var(--primary-glow), 0 0 20px rgba(139, 92, 246, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
    }

    .volume-slider::-moz-range-track {
      height: 4px;
      border-radius: 4px;
      background: rgba(139, 92, 246, 0.1);
    }

    .vol-icon {
      color: var(--secondary);
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 4px var(--primary-glow));
      opacity: 0.7;
    }

    .audio-visualizer {
      display: flex;
      gap: 3px;
      align-items: flex-end;
      height: 20px;
    }

    .audio-bar {
      width: 3px;
      background: var(--primary);
      border-radius: 2px;
      transition: height 0.15s ease;
      opacity: 0.7;
    }

    .audio-bar.active {
      animation: audio-bounce 0.6s ease-in-out infinite;
    }

    .audio-bar:nth-child(1) { animation-delay: 0s; }
    .audio-bar:nth-child(2) { animation-delay: 0.1s; }
    .audio-bar:nth-child(3) { animation-delay: 0.2s; }
    .audio-bar:nth-child(4) { animation-delay: 0.3s; }
    .audio-bar:nth-child(5) { animation-delay: 0.15s; }

    @keyframes audio-bounce {
      0%, 100% { height: 4px; }
      50% { height: 18px; }
    }

    /* Floating Particles */
    .particle {
      position: fixed;
      width: 2px;
      height: 2px;
      background: var(--primary);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      z-index: 0;
    }

    /* Particle Connection Lines Canvas */
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 0;
      will-change: contents;
    }

    /* Scan Line Effect */
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      pointer-events: none;
      z-index: 2;
    }

    /* Watermark */
    .watermark {
      position: fixed;
      bottom: 30px;
      left: 30px;
      font-size: 0.65rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.08);
      z-index: 100;
    }

    /* Elapsed time */
    .elapsed {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 0.6rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0;
      transition: opacity 1s ease 1s;
      z-index: 100;
      font-family: 'Furore', sans-serif;
    }

    .elapsed.visible {
      opacity: 0.4;
    }

    /* Mobile */
    /* ===== MOBILE / TABLET ===== */
    @media (max-width: 768px) {
      .cursor, .cursor-dot, .trail-dot {
        display: none !important;
      }

      * {

      }

      body {

  <script>
    // ==========================================
    // CROSSHAIR CURSOR + TRAIL
    // ==========================================
    const cursor = document.querySelector('.cursor');
    const cursorDot = document.querySelector('.cursor-dot');
    const TRAIL_LENGTH = 12;
    const trailDots = [];
    const trailPositions = [];
    let mouseX = 0, mouseY = 0;

    for (let i = 0; i < TRAIL_LENGTH; i++) {
      const dot = document.createElement('div');
      dot.className = 'trail-dot';
      document.body.appendChild(dot);
      trailDots.push(dot);
      trailPositions.push({ x: 0, y: 0 });
    }

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursor.style.transform = `translate(${mouseX - 15}px, ${mouseY - 15}px)`;
      cursorDot.style.transform = `translate(${mouseX - 3}px, ${mouseY - 3}px)`;
    });

    // Touch support for mobile
    document.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      mouseX = touch.clientX;
      mouseY = touch.clientY;
    }, { passive: true });
    document.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      mouseX = touch.clientX;
      mouseY = touch.clientY;
    }, { passive: true });

    function animateTrail() {
      trailPositions[0].x += (mouseX - trailPositions[0].x) * 0.4;
      trailPositions[0].y += (mouseY - trailPositions[0].y) * 0.4;

      for (let i = 1; i < TRAIL_LENGTH; i++) {
        trailPositions[i].x += (trailPositions[i - 1].x - trailPositions[i].x) * 0.3;
        trailPositions[i].y += (trailPositions[i - 1].y - trailPositions[i].y) * 0.3;
      }

      for (let i = 0; i < TRAIL_LENGTH; i++) {
        const progress = i / TRAIL_LENGTH;
        const size = 4 * (1 - progress);
        trailDots[i].style.transform = `translate(${trailPositions[i].x - size / 2}px, ${trailPositions[i].y - size / 2}px)`;
        trailDots[i].style.width = size + 'px';
        trailDots[i].style.height = size + 'px';
        trailDots[i].style.opacity = 0.6 * (1 - progress);
      }

      requestAnimationFrame(animateTrail);
    }
    animateTrail();

    document.querySelectorAll('a, button, .start-screen, .avatar-container, .tag').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    // ==========================================
    // CLICK RIPPLE + BURST PARTICLES
    // ==========================================
    document.addEventListener('click', (e) => {
      // Ripple ring
      const ripple = document.createElement('div');
      ripple.className = 'click-ripple';
      ripple.style.left = e.clientX + 'px';
      ripple.style.top = e.clientY + 'px';
      document.body.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());

      // Burst particles
      for (let i = 0; i < 5; i++) {
        const p = document.createElement('div');
        p.className = 'burst-particle';
        p.style.left = e.clientX + 'px';
        p.style.top = e.clientY + 'px';
        document.body.appendChild(p);
        const angle = (Math.PI * 2 / 5) * i + Math.random() * 0.5;
        const speed = 40 + Math.random() * 40;
        const tx = Math.cos(angle) * speed;
        const ty = Math.sin(angle) * speed;
        p.animate([
          { transform: 'translate(0, 0) scale(1)', opacity: 1 },
          { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
        ], { duration: 500, easing: 'ease-out' }).onfinish = () => p.remove();
      }
    });

    // ==========================================
    // CARD GLOW + 3D TILT
    // ==========================================
    const profileCard = document.getElementById('profileCard');
    let cardTiltX = 0, cardTiltY = 0, targetTiltX = 0, targetTiltY = 0;
    let cardAnimating = false;

    profileCard.addEventListener('mousemove', (e) => {
      const rect = profileCard.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;
      profileCard.style.setProperty('--mouse-x', (x * 100) + '%');
      profileCard.style.setProperty('--mouse-y', (y * 100) + '%');

      targetTiltX = (x - 0.5) * 25;
      targetTiltY = -(y - 0.5) * 25;

      if (!cardAnimating) {
        cardAnimating = true;
        animateCard();
      }

      // Inner elements pop-out toward cursor (translateZ)
      const avatarEl = document.querySelector('.avatar-container');
      const usernameEl = document.querySelector('.username');
      const socialsEl = document.querySelector('.socials');
      if (avatarEl) avatarEl.style.transform = `translateZ(40px) translate(${(x - 0.5) * 8}px, ${(y - 0.5) * 8}px)`;
      if (usernameEl) usernameEl.style.transform = `translateZ(30px) translate(${(x - 0.5) * 5}px, ${(y - 0.5) * 5}px)`;
      if (socialsEl) socialsEl.style.transform = `translateZ(50px) translate(${(x - 0.5) * 12}px, ${(y - 0.5) * 12}px)`;
    });

    profileCard.addEventListener('mouseleave', () => {
      targetTiltX = 0;
      targetTiltY = 0;

      // Reset inner elements
      const avatarEl = document.querySelector('.avatar-container');
      const usernameEl = document.querySelector('.username');
      const socialsEl = document.querySelector('.socials');
      if (avatarEl) avatarEl.style.transform = '';
      if (usernameEl) usernameEl.style.transform = '';
      if (socialsEl) socialsEl.style.transform = '';
    });

    function animateCard() {
      cardTiltX += (targetTiltX - cardTiltX) * 0.08;
      cardTiltY += (targetTiltY - cardTiltY) * 0.08;

      profileCard.style.transform = `perspective(800px) rotateY(${cardTiltX}deg) rotateX(${cardTiltY}deg) translateZ(10px)`;

      if (Math.abs(targetTiltX - cardTiltX) > 0.01 || Math.abs(targetTiltY - cardTiltY) > 0.01) {
        requestAnimationFrame(animateCard);
      } else {
        cardAnimating = false;
        if (targetTiltX === 0 && targetTiltY === 0) {
          profileCard.style.transform = 'perspective(800px) rotateY(0) rotateX(0)';
        }
      }
    }

    // ==========================================
    // AVATAR GLITCH ON CLICK
    // ==========================================
    const avatarContainer = document.getElementById('avatarContainer');
    avatarContainer.addEventListener('click', (e) => {
      e.preventDefault();
      avatarContainer.classList.add('glitch');
      setTimeout(() => avatarContainer.classList.remove('glitch'), 400);
    });

    // ==========================================
    // MAGNETIC SOCIAL ICONS + CLICK COUNTERS
    // ==========================================
    const clickCounts = JSON.parse(localStorage.getItem('scene_clicks') || '{}');

    document.querySelectorAll('.social-link').forEach(link => {
      const name = link.getAttribute('data-name');
      const countEl = link.querySelector('.click-count');
      const tooltipName = link.getAttribute('data-tooltip');

      // Restore saved count
      if (clickCounts[name]) countEl.textContent = clickCounts[name];

      // Add tooltip
      const tooltip = document.createElement('span');
      tooltip.className = 'tooltip';
      tooltip.textContent = tooltipName;
      link.appendChild(tooltip);

      // Magnetic effect
      link.addEventListener('mousemove', (e) => {
        const rect = link.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = (e.clientX - cx) * 0.35;
        const dy = (e.clientY - cy) * 0.35;
        link.style.transform = `translate(${dx}px, ${dy}px) scale(1.15)`;
      });

      link.addEventListener('mouseleave', () => {
        link.style.transform = 'translate(0, 0) scale(1)';
      });

      // Click counter
      link.addEventListener('click', (e) => {
        e.preventDefault();
        clickCounts[name] = (clickCounts[name] || 0) + 1;
        countEl.textContent = clickCounts[name];
        localStorage.setItem('scene_clicks', JSON.stringify(clickCounts));

    function shuffleReveal(el, text, onDone) {
      const len = text.length;
      const locked = new Array(len).fill(false);
      let iterations = 0;

      const interval = setInterval(() => {
        let result = '';
        for (let i = 0; i < len; i++) {
          if (locked[i]) {
            result += text[i];
          } else {
            result += shuffleChars[Math.floor(Math.random() * shuffleChars.length)];
          }
        }
        el.textContent = result;
        el.setAttribute('data-text', result);

        // Lock characters one by one from left to right
        if (iterations > 3) {
          const lockIndex = Math.floor((iterations - 3) / 2);
          if (lockIndex < len) locked[lockIndex] = true;
        }

        iterations++;

        if (locked.every(v => v)) {
          clearInterval(interval);
          el.textContent = text;
          if (onDone) onDone();
        }
      }, 40);
    }

    function shuffleBio(target, onDone) {
      if (bioShuffling) return;
      bioShuffling = true;
      const maxLen = Math.max(bioEl.textContent.length, target.length);
      let iterations = 0;
      const interval = setInterval(() => {
        bioEl.textContent = target.split('').map((char, idx) => {
          if (char === ' ') return ' ';
          if (idx < iterations) return target[idx];
          return shuffleChars[Math.floor(Math.random() * shuffleChars.length)];
        }).join('');
        if (iterations >= target.length) {
          clearInterval(interval);
          bioEl.textContent = target;
          bioShuffling = false;
          if (onDone) onDone();
        }
        iterations += 1/3;
      }, 35);
    }

    // ==========================================
    // INTERACTIVE PARTICLES + CONNECTION LINES
    // ==========================================
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    const particlesArr = [];
    const ripples = [];
    let isMouseDown = false;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Click ripple effect on background
    document.addEventListener('mousedown', (e) => {
      isMouseDown = true;
      ripples.push({
        x: e.clientX,
        y: e.clientY,
        radius: 0,
        maxRadius: 250,
        opacity: 0.6,
        speed: 8,
        lineWidth: 3
      });
      // Burst particles outward from click
      particlesArr.forEach(p => {
        const dx = p.x - e.clientX;
        const dy = p.y - e.clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 200 && dist > 0) {
          const force = (200 - dist) / 200 * 4;
          p.vx += (dx / dist) * force;
          p.vy += (dy / dist) * force;
        }
      });
    });
    document.addEventListener('mouseup', () => { isMouseDown = false; });

    function initParticles() {
      const count = Math.min(60, Math.floor(window.innerWidth * window.innerHeight / 25000));
      for (let i = 0; i < count; i++) {
        particlesArr.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 0.7,
          vy: (Math.random() - 0.5) * 0.7,
          size: Math.random() * 3 + 1,
          baseSize: Math.random() * 3 + 1,
          pulse: Math.random() * Math.PI * 2,
          hue: Math.random() > 0.7 ? 270 : 260 // mix of purples
        });
      }
      animateParticles();
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const now = Date.now();

      // Draw and update ripples
      for (let i = ripples.length - 1; i >= 0; i--) {
        const r = ripples[i];
        r.radius += r.speed;
        r.opacity *= 0.96;
        r.lineWidth *= 0.98;
        if (r.opacity < 0.01 || r.radius > r.maxRadius) {
          ripples.splice(i, 1);
          continue;
        }
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(139, 92, 246, ${r.opacity})`;
        ctx.lineWidth = r.lineWidth;
        ctx.stroke();
        // Inner glow ring
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius * 0.7, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(167, 139, 250, ${r.opacity * 0.4})`;
        ctx.lineWidth = r.lineWidth * 0.5;
        ctx.stroke();
      }

      // Draw mouse glow on background
      if (mouseX > 0 && mouseY > 0) {
        const glowRadius = isMouseDown ? 120 : 80;
        const glowOpacity = isMouseDown ? 0.12 : 0.06;
        const gradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, glowRadius);
        gradient.addColorStop(0, `rgba(139, 92, 246, ${glowOpacity})`);
        gradient.addColorStop(0.5, `rgba(139, 92, 246, ${glowOpacity * 0.4})`);
        gradient.addColorStop(1, 'rgba(139, 92, 246, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(mouseX - glowRadius, mouseY - glowRadius, glowRadius * 2, glowRadius * 2);
      }

      ctx.lineWidth = 0.5;

      particlesArr.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.pulse += 0.02;

        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;

        // Mouse interaction
        const dx = p.x - mouseX;
        const dy = p.y - mouseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        let drawX = p.x, drawY = p.y;

        // Strong repulsion close to cursor
        if (dist < 180 && dist > 0) {
          const force = (180 - dist) / 180;
          drawX += (dx / dist) * force * 60;
          drawY += (dy / dist) * force * 60;
          // Particles grow when near cursor
          p.size = p.baseSize + force * 3;
        } else {
          p.size = p.baseSize + Math.sin(p.pulse) * 0.5;
        }

        // Mouse hold = attract particles toward cursor
        if (isMouseDown && dist < 400 && dist > 30) {
          const pull = (400 - dist) / 400 * 0.8;
          p.vx += (mouseX - p.x) * pull * 0.003;
          p.vy += (mouseY - p.y) * pull * 0.003;
        }
        // Gentle attraction at medium range
        else if (dist > 180 && dist < 350) {
          const pull = (350 - dist) / 350 * 0.15;
          p.vx += (mouseX - p.x) * pull * 0.001;
          p.vy += (mouseY - p.y) * pull * 0.001;
        }

        // Friction + speed limit
        p.vx *= 0.99;
        p.vy *= 0.99;
        const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        if (speed > 2.5) {
          p.vx *= 2.5 / speed;
          p.vy *= 2.5 / speed;
        }

        p.drawX = drawX;
        p.drawY = drawY;

        // Draw particle with glow
        const opacity = 0.4 + Math.sin(now * 0.002 + p.pulse) * 0.2;
        const glowSize = p.size * 3;
        const grd = ctx.createRadialGradient(drawX, drawY, 0, drawX, drawY, glowSize);
        grd.addColorStop(0, `hsla(${p.hue}, 75%, 65%, ${opacity})`);
        grd.addColorStop(0.4, `hsla(${p.hue}, 75%, 55%, ${opacity * 0.3})`);
        grd.addColorStop(1, `hsla(${p.hue}, 75%, 50%, 0)`);
        ctx.beginPath();
        ctx.arc(drawX, drawY, glowSize, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Core dot
        ctx.beginPath();
        ctx.arc(drawX, drawY, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue}, 80%, 75%, ${opacity + 0.2})`;
        ctx.fill();
      });

      // Connection lines between particles
      const maxDist2 = 140 * 140;
      const maxMouseDist2 = 220 * 220;

      for (let i = 0; i < particlesArr.length; i++) {
        const a = particlesArr[i];
        for (let j = i + 1; j < particlesArr.length; j++) {
          const b = particlesArr[j];
          const dx = a.drawX - b.drawX;
          const dy = a.drawY - b.drawY;
          const dist2 = dx * dx + dy * dy;

          if (dist2 < maxDist2) {
            const opacity = (1 - Math.sqrt(dist2) / 140) * 0.2;
            ctx.beginPath();
            ctx.moveTo(a.drawX, a.drawY);
            ctx.lineTo(b.drawX, b.drawY);
            ctx.strokeStyle = `rgba(139, 92, 246, ${opacity})`;
            ctx.lineWidth = 0.6;
            ctx.stroke();
          }
        }

        // Lines from particle to cursor (web effect)
        const dmx = a.drawX - mouseX;
        const dmy = a.drawY - mouseY;
        const dm2 = dmx * dmx + dmy * dmy;
        if (dm2 < maxMouseDist2) {
          const dist = Math.sqrt(dm2);
          const opacity = (1 - dist / 220) * 0.35;
          ctx.beginPath();
          ctx.moveTo(a.drawX, a.drawY);
          ctx.lineTo(mouseX, mouseY);
          // Gradient line from particle color to cursor
          const grad = ctx.createLinearGradient(a.drawX, a.drawY, mouseX, mouseY);
          grad.addColorStop(0, `rgba(167, 139, 250, ${opacity})`);
          grad.addColorStop(1, `rgba(139, 92, 246, ${opacity * 0.5})`);
          ctx.strokeStyle = grad;
          ctx.lineWidth = 0.8 * (1 - dist / 220) + 0.2;
          ctx.stroke();
        }
      }

      requestAnimationFrame(animateParticles);
    }

    // ==========================================
    // VIEW COUNTER

    // ==========================================
    const audioBtn = document.getElementById('audioBtn');
    const bars = document.querySelectorAll('.audio-bar');
    const iconOn = document.getElementById('audioIconOn');

      audio.volume = vol;
      e.target.style.setProperty('--vol', e.target.value + '%');

      // If volume is 0, show muted state
      if (vol === 0 && audioPlaying) {
        iconOn.style.display = 'none';
        iconOff.style.display = '';
      } else if (vol > 0 && audioPlaying) {
        iconOn.style.display = '';
        iconOff.style.display = 'none';
      }
    });
  </script>
</body>
</html>
