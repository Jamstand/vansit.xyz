<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Furore';
      src: url('Furore.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none;
    }

    :root {
      --primary: #8b5cf6;
      --primary-glow: rgba(139, 92, 246, 0.5);
      --secondary: #a78bfa;
      --accent: #c4b5fd;
      --bg-card: rgba(10, 10, 20, 0.55);
      --border: rgba(139, 92, 246, 0.25);
      --text: #e2e8f0;
      --text-dim: rgba(226, 232, 240, 0.5);
      --live: #ef4444;
      --live-glow: rgba(239, 68, 68, 0.5);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
      font-family: 'Furore', 'Inter', sans-serif;
      color: var(--text);
    }

    /* Custom Crosshair Cursor */
    .cursor {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 10000;
      width: 30px;
      height: 30px;
      will-change: transform;
    }

    .cursor::before, .cursor::after {
      content: '';
      position: absolute;
      background: var(--primary);
      box-shadow: 0 0 6px var(--primary-glow), 0 0 12px var(--primary-glow);
    }

    .cursor::before {
      width: 1.5px;
      height: 30px;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
    }

    .cursor::after {
      width: 30px;
      height: 1.5px;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
    }

    .cursor-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 10001;
      box-shadow: 0 0 8px var(--primary), 0 0 20px var(--primary-glow);
      will-change: transform;
    }

    .cursor.hover {
      transform: scale(1.5);
    }

    .cursor.hover::before, .cursor.hover::after {
      background: var(--accent);
    }

    /* Cursor Trail */
    .trail-dot {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 6px var(--primary-glow);
      opacity: 0;
      will-change: transform, opacity;
    }

    /* Click Ripple */
    .click-ripple {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      border: 1px solid var(--primary);
      border-radius: 50%;
      animation: ripple-expand 0.6s ease-out forwards;
    }

    @keyframes ripple-expand {
      0% { width: 0; height: 0; opacity: 0.8; transform: translate(-50%, -50%); }
      100% { width: 80px; height: 80px; opacity: 0; transform: translate(-50%, -50%); }
    }

    /* Click Burst Particles */
    .burst-particle {
      position: fixed;
      pointer-events: none;
      z-index: 9997;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 4px var(--primary-glow);
    }

    /* Video Background */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -2;
      opacity: 0;
      transition: opacity 1.5s ease;
      will-change: transform, opacity;
    }

    .video-bg.loaded {
      opacity: 1;
    }

    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
      z-index: -1;
      transition: background 0.5s ease;
    }

    .vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      box-shadow: inset 0 0 200px rgba(0, 0, 0, 0.8);
      z-index: -1;
      pointer-events: none;
    }

    /* Start Screen */
    .start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .start-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .start-text {
      font-family: 'Furore', 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--text-dim);
      animation: pulse-text 2s ease-in-out infinite;
    }

    .start-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      margin-top: 20px;
      animation: expand-line 2s ease-in-out infinite;
    }

    @keyframes pulse-text {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes expand-line {
      0%, 100% { width: 60px; }
      50% { width: 120px; }
    }

    /* Main Container */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      opacity: 0;
      z-index: 1;
      perspective: 1200px;
      transition: opacity 0.5s ease 0.2s;
    }

    .container.visible {
      opacity: 1;
    }

    .container.visible .social-link {
      animation: button-entrance 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, button-glow-pulse 3s ease-in-out infinite 0.8s, button-float 4s ease-in-out infinite 0.8s;
      opacity: 0;
      transform: translateY(20px) scale(0.5);
    }

    .container.visible .social-link:nth-child(1) { animation-delay: 0.2s, 1s, 1s; }
    .container.visible .social-link:nth-child(2) { animation-delay: 0.35s, 1.15s, 1.15s; }
    .container.visible .social-link:nth-child(3) { animation-delay: 0.5s, 1.3s, 1.3s; }
    .container.visible .social-link:nth-child(4) { animation-delay: 0.65s, 1.45s, 1.45s; }
    .container.visible .social-link:nth-child(5) { animation-delay: 0.8s, 1.6s, 1.6s; }

    @keyframes button-entrance {
      0% { opacity: 0; transform: translateY(20px) scale(0.5); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Profile Card */
    .profile-card {
      background: rgba(14, 14, 20, 0.65);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 22px;
      padding: 40px 50px;
      text-align: center;
      position: relative;
      overflow: hidden;
      min-width: 380px;
      max-width: 420px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.1), 0 0 80px rgba(139, 92, 246, 0.05);
      animation: card-breathe 5s ease-in-out infinite;
      /* Unfold entrance - starts folded */
      opacity: 0;
      transform: perspective(1200px) rotateX(-90deg) scaleY(0.5);
      transform-origin: top center;
    }

    .container.visible .profile-card {
      animation: card-unfold 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards, card-breathe 5s ease-in-out infinite 1.5s;
    }

    @keyframes card-unfold {
      0% {
        opacity: 0;
        transform: perspective(1200px) rotateX(-90deg) scaleY(0.5);
        box-shadow: 0 0 0 rgba(139, 92, 246, 0);
      }
      30% {
        opacity: 1;
        transform: perspective(1200px) rotateX(-20deg) scaleY(0.85);
      }
      50% {
        transform: perspective(1200px) rotateX(10deg) scaleY(1.02);
        box-shadow: 0 20px 60px rgba(139, 92, 246, 0.3), 0 0 80px rgba(139, 92, 246, 0.1);
      }
      70% {
        transform: perspective(1200px) rotateX(-5deg) scaleY(0.99);
      }
      100% {
        opacity: 1;
        transform: perspective(1200px) rotateX(0deg) scaleY(1);
        box-shadow: 0 0 40px rgba(139, 92, 246, 0.1), 0 0 80px rgba(139, 92, 246, 0.05);
      }
    }

    @keyframes card-breathe {
      0%, 100% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.1), 0 0 80px rgba(139, 92, 246, 0.05); }
      50% { box-shadow: 0 0 60px rgba(139, 92, 246, 0.15), 0 0 120px rgba(139, 92, 246, 0.08); }
    }

    /* Primary flowing border */
    .profile-card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      right: -1px;
      bottom: -1px;
      border-radius: 20px;
      padding: 1.5px;
      background: conic-gradient(
        from var(--border-angle, 0deg),
        transparent 20%,
        var(--primary) 30%,
        var(--accent) 35%,
        var(--secondary) 40%,
        transparent 50%,
        transparent 70%,
        var(--secondary) 80%,
        var(--primary) 85%,
        transparent 95%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: spin-border 3s linear infinite;
      pointer-events: none;
      filter: blur(0.5px);
    }

    /* Secondary counter-rotating glow trail */
    .profile-card::after {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      border-radius: 20px;
      padding: 2px;
      background: conic-gradient(
        from var(--border-angle2, 180deg),
        transparent 35%,
        rgba(139, 92, 246, 0.4) 45%,
        transparent 55%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: spin-border-reverse 5s linear infinite;
      pointer-events: none;
      filter: blur(4px);
    }

    @keyframes spin-border {
      to { --border-angle: 360deg; }
    }

    @keyframes spin-border-reverse {
      to { --border-angle2: -180deg; }
    }

    @property --border-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    @property --border-angle2 {
      syntax: '<angle>';
      initial-value: 180deg;
      inherits: false;
    }

    .profile-card .glow {
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), var(--primary-glow), transparent 40%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .profile-card:hover .glow {
      opacity: 0.15;
    }

    /* Avatar */
    .avatar-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
      transition: transform 0.3s ease;
    }

    .avatar-container:hover {
      transform: scale(1.1);
    }

    .avatar-container:hover .avatar {
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--primary-glow);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      object-fit: cover;
      position: relative;
      z-index: 1;
      background: var(--bg-card);
      transition: all 0.3s ease;
    }

    .avatar-ring {
      position: absolute;
      top: -6px;
      left: -6px;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--primary);
      border-right-color: var(--secondary);
      animation: spin-ring 3s linear infinite;
    }

    @keyframes spin-ring {
      to { transform: rotate(360deg); }
    }

    .avatar-pulse {
      position: absolute;
      top: -4px;
      left: -4px;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 1px solid var(--primary);
      animation: avatar-pulse-anim 2s ease-in-out infinite;
    }

    @keyframes avatar-pulse-anim {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0; }
    }

    /* Glitch effect on avatar click */
    .avatar-container.glitch .avatar {
      animation: glitch-avatar 0.4s ease;
    }

    @keyframes glitch-avatar {
      0% { transform: translate(0); filter: hue-rotate(0deg); }
      20% { transform: translate(-3px, 2px); filter: hue-rotate(90deg); }
      40% { transform: translate(3px, -2px); filter: hue-rotate(180deg); }
      60% { transform: translate(-2px, -3px); filter: hue-rotate(270deg); }
      80% { transform: translate(2px, 3px); filter: hue-rotate(360deg); }
      100% { transform: translate(0); filter: hue-rotate(0deg); }
    }

    /* Username */
    .username {
      font-family: 'Furore', 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
      background: linear-gradient(135deg, var(--text), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .verified-badge {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 6px rgba(29, 155, 240, 0.6));
      animation: badge-glow 2s ease-in-out infinite;
    }

    @keyframes badge-glow {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(29, 155, 240, 0.5)); }
      50% { filter: drop-shadow(0 0 10px rgba(29, 155, 240, 0.9)) drop-shadow(0 0 20px rgba(29, 155, 240, 0.4)); }
    }

    .username .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 1.4rem;
      background: var(--primary);
      margin-left: 2px;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      -webkit-text-fill-color: var(--primary);
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Live Status Badge */
    .live-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      transition: all 0.5s ease;
    }

    .live-status.live {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #f87171;
      box-shadow: 0 0 20px var(--live-glow);
      animation: live-pulse 2s ease-in-out infinite;
    }

    .live-status.offline {
      background: rgba(100, 116, 139, 0.15);
      border: 1px solid rgba(100, 116, 139, 0.3);
      color: #94a3b8;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    .live .live-dot {
      background: #ef4444;
      box-shadow: 0 0 8px var(--live-glow);
      animation: live-dot-pulse 1.5s ease-in-out infinite;
    }

    .offline .live-dot {
      background: #64748b;
    }

    @keyframes live-pulse {
      0%, 100% { box-shadow: 0 0 15px var(--live-glow); }
      50% { box-shadow: 0 0 30px var(--live-glow); }
    }

    @keyframes live-dot-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    /* Tags / Badges */
    .tags {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--secondary);
      background: rgba(139, 92, 246, 0.08);
      transition: all 0.3s ease;
    }

    .tag:hover {
      border-color: var(--primary);
      color: var(--text);
      background: rgba(139, 92, 246, 0.2);
      box-shadow: 0 0 15px var(--primary-glow);
      transform: scale(1.05);
    }

    /* Bio */
    .bio {
      font-size: 0.85rem;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 24px;
      min-height: 1.6em;
    }

    .bio .cursor-blink {
      display: inline-block;
      width: 1.5px;
      height: 0.85rem;
      background: var(--text-dim);
      margin-left: 1px;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
    }

    /* Social Links */
    .socials {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .social-link {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      border: 1.5px solid var(--btn-color-dim);
      background: var(--btn-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--btn-color);
      text-decoration: none;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      gap: 3px;
      animation: button-glow-pulse 3s ease-in-out infinite, button-float 4s ease-in-out infinite;
      box-shadow: 0 0 10px var(--btn-glow), inset 0 0 15px var(--btn-bg);
      --btn-color: #9146ff;
      --btn-color-dim: rgba(145, 70, 255, 0.3);
      --btn-glow: rgba(145, 70, 255, 0.4);
      --btn-bg: rgba(145, 70, 255, 0.06);
      --btn-color-bright: #9146ff;
    }

    /* Twitch - Purple */
    .social-link[data-name="twitch"] {
      --btn-color: #9146ff;
      --btn-color-dim: rgba(145, 70, 255, 0.35);
      --btn-glow: rgba(145, 70, 255, 0.5);
      --btn-bg: rgba(145, 70, 255, 0.08);
      --btn-color-bright: #b380ff;
      animation-delay: 0s;
    }

    /* Discord - Blurple */
    .social-link[data-name="discord"] {
      --btn-color: #5865f2;
      --btn-color-dim: rgba(88, 101, 242, 0.35);
      --btn-glow: rgba(88, 101, 242, 0.5);
      --btn-bg: rgba(88, 101, 242, 0.08);
      --btn-color-bright: #7983f5;
      animation-delay: 0.3s;
    }

    /* YouTube - Red */
    .social-link[data-name="youtube"] {
      --btn-color: #ff0033;
      --btn-color-dim: rgba(255, 0, 51, 0.35);
      --btn-glow: rgba(255, 0, 51, 0.5);
      --btn-bg: rgba(255, 0, 51, 0.08);
      --btn-color-bright: #ff4466;
      animation-delay: 0.6s;
    }

    /* Spotify - Green */
    .social-link[data-name="spotify"] {
      --btn-color: #1db954;
      --btn-color-dim: rgba(29, 185, 84, 0.35);
      --btn-glow: rgba(29, 185, 84, 0.5);
      --btn-bg: rgba(29, 185, 84, 0.08);
      --btn-color-bright: #1ed760;
      animation-delay: 0.9s;
    }

    /* TikTok - Cyan/Pink dual */
    .social-link[data-name="tiktok"] {
      --btn-color: #ff0050;
      --btn-color-dim: rgba(0, 242, 234, 0.25);
      --btn-glow: rgba(0, 242, 234, 0.4);
      --btn-bg: rgba(255, 0, 80, 0.06);
      --btn-color-bright: #00f2ea;
      animation-delay: 1.2s;
    }

    @keyframes button-glow-pulse {
      0%, 100% {
        box-shadow: 0 0 10px var(--btn-glow), 0 0 3px var(--btn-glow), inset 0 0 8px var(--btn-bg);
        border-color: var(--btn-color-dim);
      }
      50% {
        box-shadow: 0 0 22px var(--btn-glow), 0 0 44px var(--btn-glow), inset 0 0 12px var(--btn-bg);
        border-color: var(--btn-color);
      }
    }

    @keyframes button-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    /* Shimmer sweep effect */
    .social-link::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, var(--btn-glow), transparent, transparent);
      animation: btn-border-spin 4s linear infinite;
      opacity: 0.4;
    }

    .social-link::after {
      content: '';
      position: absolute;
      inset: 1.5px;
      border-radius: 14.5px;
      background: linear-gradient(145deg, rgba(20, 20, 30, 0.95), rgba(10, 10, 18, 0.98));
      z-index: 0;
    }

    @keyframes btn-border-spin {
      to { transform: rotate(360deg); }
    }

    .social-link:hover {
      border-color: var(--btn-color-bright);
      color: var(--btn-color-bright);
      box-shadow: 0 0 30px var(--btn-glow), 0 0 60px var(--btn-glow), 0 0 90px var(--btn-glow), inset 0 0 20px var(--btn-bg);
      animation: none;
      transform: translateY(-5px) scale(1.12);
    }

    .social-link:hover::before {
      opacity: 0.8;
      animation-duration: 1.5s;
    }

    .social-link:hover::after {
      background: linear-gradient(145deg, rgba(30, 30, 45, 0.95), rgba(15, 15, 25, 0.98));
    }

    .social-link svg {
      width: 20px;
      height: 20px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 0 5px var(--btn-glow));
      transition: filter 0.3s ease, transform 0.3s ease;
    }

    .social-link:hover svg {
      filter: drop-shadow(0 0 10px var(--btn-glow)) drop-shadow(0 0 20px var(--btn-glow));
      transform: scale(1.15);
    }

    /* Discord blurple/grey spinning border */
    .social-link[data-name="discord"]::before {
      background: conic-gradient(from 0deg, #5865f2, #888, #5865f2, transparent, #888, #5865f2);
      opacity: 0.7;
      animation: btn-border-spin 2.5s linear infinite;
    }
    .social-link[data-name="discord"]:hover::before {
      opacity: 1;
      animation-duration: 1s;
    }

    /* Twitch purple/grey spinning border */
    .social-link[data-name="twitch"]::before {
      background: conic-gradient(from 0deg, #9146ff, #888, #9146ff, transparent, #888, #9146ff);
      opacity: 0.7;
      animation: btn-border-spin 2.5s linear infinite;
    }
    .social-link[data-name="twitch"]:hover::before {
      opacity: 1;
      animation-duration: 1s;
    }

    /* YouTube red/white spinning border */
    .social-link[data-name="youtube"]::before {
      background: conic-gradient(from 0deg, #ff0000, #fff, #ff0000, transparent, #fff, #ff0000);
      opacity: 0.7;
      animation: btn-border-spin 2.5s linear infinite;
    }
    .social-link[data-name="youtube"]:hover::before {
      opacity: 1;
      animation-duration: 1s;
    }

    /* Spotify green/grey spinning border */
    .social-link[data-name="spotify"]::before {
      background: conic-gradient(from 0deg, #1db954, #888, #1db954, transparent, #888, #1db954);
      opacity: 0.7;
      animation: btn-border-spin 2.5s linear infinite;
    }
    .social-link[data-name="spotify"]:hover::before {
      opacity: 1;
      animation-duration: 1s;
    }

    /* TikTok dual color spinning border */
    .social-link[data-name="tiktok"]::before {
      background: conic-gradient(from 0deg, #ff0050, #00f2ea, #ff0050, transparent, #00f2ea, #ff0050);
      opacity: 0.7;
      animation: btn-border-spin 2.5s linear infinite;
    }

    .social-link[data-name="tiktok"]:hover::before {
      opacity: 1;
      animation-duration: 1s;
    }

    /* TikTok dual color glow */
    .social-link[data-name="tiktok"] svg {
      filter: drop-shadow(0 0 4px rgba(255, 0, 80, 0.6)) drop-shadow(0 0 4px rgba(0, 242, 234, 0.6));
    }
    .social-link[data-name="tiktok"]:hover svg {
      filter: drop-shadow(0 0 10px rgba(255, 0, 80, 0.8)) drop-shadow(0 0 10px rgba(0, 242, 234, 0.8));
    }

    /* TikTok glowing ring - animated pulsing glow */
    .social-link[data-name="tiktok"] .tiktok-ring {
      position: absolute;
      inset: -4px;
      border-radius: 18px;
      pointer-events: none;
      z-index: -1;
      padding: 2px;
      background: linear-gradient(135deg, #ff0050, #00f2ea, #ff0050);
      background-size: 200% 200%;
      animation: tiktok-gradient-shift 2s ease-in-out infinite, tiktok-ring-pulse 2s ease-in-out infinite;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    .social-link[data-name="tiktok"] .tiktok-ring-glow {
      position: absolute;
      inset: -6px;
      border-radius: 20px;
      pointer-events: none;
      z-index: -2;
      animation: tiktok-ring-pulse 2s ease-in-out infinite;
      box-shadow:
        0 0 12px rgba(255, 0, 80, 0.5),
        0 0 24px rgba(0, 242, 234, 0.3);
    }

    @keyframes tiktok-gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes tiktok-ring-pulse {
      0%, 100% {
        opacity: 0.6;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.04);
      }
    }

    /* === ICON ANIMATIONS === */

    /* Twitch - chat bubble bounce */
    .social-link[data-name="twitch"] svg {
      animation: twitch-icon-pulse 2s ease-in-out infinite;
    }
    @keyframes twitch-icon-pulse {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1) rotate(-3deg); }
      75% { transform: scale(0.95) rotate(3deg); }
    }

    /* Discord - wobble/shake */
    .social-link[data-name="discord"] svg {
      animation: discord-icon-wobble 3s ease-in-out infinite;
    }
    @keyframes discord-icon-wobble {
      0%, 100% { transform: rotate(0deg); }
      15% { transform: rotate(5deg) scale(1.05); }
      30% { transform: rotate(-5deg) scale(1.05); }
      45% { transform: rotate(3deg); }
      60% { transform: rotate(-2deg); }
      75% { transform: rotate(0deg); }
    }

    /* YouTube - play button pulse with glow */
    .social-link[data-name="youtube"] svg {
      animation: youtube-icon-beat 2.5s ease-in-out infinite;
    }
    @keyframes youtube-icon-beat {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 3px rgba(255, 0, 51, 0.5)); }
      15% { transform: scale(1.15); filter: drop-shadow(0 0 10px rgba(255, 0, 51, 0.8)); }
      30% { transform: scale(0.95); filter: drop-shadow(0 0 3px rgba(255, 0, 51, 0.5)); }
      45% { transform: scale(1.08); filter: drop-shadow(0 0 8px rgba(255, 0, 51, 0.7)); }
      60% { transform: scale(1); }
    }

    /* Spotify - music wave / bounce */
    .social-link[data-name="spotify"] svg {
      animation: spotify-icon-dance 2.8s ease-in-out infinite;
    }
    @keyframes spotify-icon-dance {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      20% { transform: translateY(-2px) rotate(-4deg); }
      40% { transform: translateY(1px) rotate(2deg); }
      60% { transform: translateY(-1px) rotate(-2deg); }
      80% { transform: translateY(0px) rotate(3deg); }
    }

    /* TikTok - color shift glow */
    .social-link[data-name="tiktok"] svg {
      animation: tiktok-icon-glow 2.5s ease-in-out infinite;
    }
    @keyframes tiktok-icon-glow {
      0%, 100% {
        filter: drop-shadow(2px 0 0 rgba(255, 0, 80, 0.7)) drop-shadow(-2px 0 0 rgba(0, 242, 234, 0.7));
        transform: scale(1);
      }
      50% {
        filter: drop-shadow(-2px 0 0 rgba(255, 0, 80, 0.9)) drop-shadow(2px 0 0 rgba(0, 242, 234, 0.9)) drop-shadow(0 0 8px rgba(255, 0, 80, 0.4));
        transform: scale(1.08);
      }
    }

    /* Click Counter Badge */
    .click-count {
      font-size: 0.45rem;
      color: var(--btn-color);
      position: relative;
      z-index: 1;
      letter-spacing: 1px;
      opacity: 0.7;
      font-weight: 600;
      min-width: 12px;
      text-align: center;
      text-shadow: 0 0 6px var(--btn-glow);
    }

    /* Click animation */
    .social-link.clicked {
      animation: button-pop 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) !important;
    }

    @keyframes button-pop {
      0% { transform: scale(1); }
      30% { transform: scale(0.8); }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* +1 float animation */
    .click-float {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--btn-color-bright, var(--accent));
      pointer-events: none;
      animation: float-up 1s ease-out forwards;
      z-index: 10;
      text-shadow: 0 0 8px var(--btn-glow);
    }

    @keyframes float-up {
      0% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
      50% { opacity: 0.8; transform: translateX(-50%) translateY(-20px) scale(1.2); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(0.8); }
    }

    /* Tooltip */
    .social-link .tooltip {
      position: absolute;
      bottom: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(8px) scale(0.9);
      background: rgba(10, 10, 18, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid var(--btn-color-dim);
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 0.55rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--btn-color-bright, var(--secondary));
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 15px var(--btn-glow);
      z-index: 10;
    }

    .social-link .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: var(--btn-color-dim);
    }

    .social-link:hover .tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    /* Visitor Counter */
    .visitor-count {
      margin-top: 20px;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0.5;
    }

    .visitor-count span {
      color: var(--secondary);
      font-weight: 600;
    }

    /* Audio Controls */
    .audio-controls {
      position: fixed;
      bottom: 30px;
      right: 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }

    .audio-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .audio-btn:hover {
      border-color: var(--primary);
      color: var(--text);
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .audio-btn svg {
      width: 18px;
      height: 18px;
    }

    .audio-visualizer {
      display: flex;
      gap: 3px;
      align-items: flex-end;
      height: 20px;
    }

    .audio-bar {
      width: 3px;
      background: var(--primary);
      border-radius: 2px;
      transition: height 0.15s ease;
      opacity: 0.7;
    }

    .audio-bar.active {
      animation: audio-bounce 0.6s ease-in-out infinite;
    }

    .audio-bar:nth-child(1) { animation-delay: 0s; }
    .audio-bar:nth-child(2) { animation-delay: 0.1s; }
    .audio-bar:nth-child(3) { animation-delay: 0.2s; }
    .audio-bar:nth-child(4) { animation-delay: 0.3s; }
    .audio-bar:nth-child(5) { animation-delay: 0.15s; }

    @keyframes audio-bounce {
      0%, 100% { height: 4px; }
      50% { height: 18px; }
    }

    /* Floating Particles */
    .particle {
      position: fixed;
      width: 2px;
      height: 2px;
      background: var(--primary);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      z-index: 0;
    }

    /* Particle Connection Lines Canvas */
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 0;
      will-change: contents;
    }

    /* Scan Line Effect */
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      pointer-events: none;
      z-index: 2;
    }

    /* Watermark */
    .watermark {
      position: fixed;
      bottom: 30px;
      left: 30px;
      font-size: 0.65rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.08);
      z-index: 100;
    }

    /* Elapsed time */
    .elapsed {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 0.6rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0;
      transition: opacity 1s ease 1s;
      z-index: 100;
      font-family: 'Space Grotesk', sans-serif;
    }

    .elapsed.visible {
      opacity: 0.4;
    }

    /* Mobile */
    @media (max-width: 480px) {
      .profile-card {
        min-width: unset;
        width: 90vw;
        padding: 30px 25px;
      }

      .username {
        font-size: 1.3rem;
      }

      .audio-controls {
        bottom: 20px;
        right: 20px;
      }

      .watermark {
        bottom: 20px;
        left: 20px;
      }

      .cursor, .cursor-dot, .trail-dot {
        display: none;
      }

      * {
        cursor: auto;
      }
    }
  </style>
</head>

  <script>
    // ==========================================
    // CROSSHAIR CURSOR + TRAIL
    // ==========================================
    const cursor = document.querySelector('.cursor');
    const cursorDot = document.querySelector('.cursor-dot');
    const TRAIL_LENGTH = 12;
    const trailDots = [];
    const trailPositions = [];
    let mouseX = 0, mouseY = 0;

    for (let i = 0; i < TRAIL_LENGTH; i++) {
      const dot = document.createElement('div');
      dot.className = 'trail-dot';
      document.body.appendChild(dot);
      trailDots.push(dot);
      trailPositions.push({ x: 0, y: 0 });
    }

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursor.style.transform = `translate(${mouseX - 15}px, ${mouseY - 15}px)`;
      cursorDot.style.transform = `translate(${mouseX - 3}px, ${mouseY - 3}px)`;
    });

    function animateTrail() {
      trailPositions[0].x += (mouseX - trailPositions[0].x) * 0.4;
      trailPositions[0].y += (mouseY - trailPositions[0].y) * 0.4;

      for (let i = 1; i < TRAIL_LENGTH; i++) {
        trailPositions[i].x += (trailPositions[i - 1].x - trailPositions[i].x) * 0.3;
        trailPositions[i].y += (trailPositions[i - 1].y - trailPositions[i].y) * 0.3;
      }

      for (let i = 0; i < TRAIL_LENGTH; i++) {
        const progress = i / TRAIL_LENGTH;
        const size = 4 * (1 - progress);
        trailDots[i].style.transform = `translate(${trailPositions[i].x - size / 2}px, ${trailPositions[i].y - size / 2}px)`;
        trailDots[i].style.width = size + 'px';
        trailDots[i].style.height = size + 'px';
        trailDots[i].style.opacity = 0.6 * (1 - progress);
      }

      requestAnimationFrame(animateTrail);
    }
    animateTrail();

    document.querySelectorAll('a, button, .start-screen, .avatar-container, .tag').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    // ==========================================
    // CLICK RIPPLE + BURST PARTICLES
    // ==========================================
    document.addEventListener('click', (e) => {
      // Ripple ring
      const ripple = document.createElement('div');
      ripple.className = 'click-ripple';
      ripple.style.left = e.clientX + 'px';
      ripple.style.top = e.clientY + 'px';
      document.body.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());

      // Burst particles
      for (let i = 0; i < 5; i++) {
        const p = document.createElement('div');
        p.className = 'burst-particle';
        p.style.left = e.clientX + 'px';
        p.style.top = e.clientY + 'px';
        document.body.appendChild(p);
        const angle = (Math.PI * 2 / 5) * i + Math.random() * 0.5;
        const speed = 40 + Math.random() * 40;
        const tx = Math.cos(angle) * speed;
        const ty = Math.sin(angle) * speed;
        p.animate([
          { transform: 'translate(0, 0) scale(1)', opacity: 1 },
          { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
        ], { duration: 500, easing: 'ease-out' }).onfinish = () => p.remove();
      }
    });

    // ==========================================
    // CARD GLOW + 3D TILT
    // ==========================================
    const profileCard = document.getElementById('profileCard');
    profileCard.addEventListener('mousemove', (e) => {
      const rect = profileCard.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;
      profileCard.style.setProperty('--mouse-x', (x * 100) + '%');
      profileCard.style.setProperty('--mouse-y', (y * 100) + '%');
      profileCard.style.transform = `perspective(1000px) rotateY(${(x - 0.5) * 10}deg) rotateX(${-(y - 0.5) * 10}deg)`;
    });

    profileCard.addEventListener('mouseleave', () => {
      profileCard.style.transform = 'perspective(1000px) rotateY(0) rotateX(0)';
    });

    // ==========================================
    // AVATAR GLITCH ON CLICK
    // ==========================================
    const avatarContainer = document.getElementById('avatarContainer');
    avatarContainer.addEventListener('click', (e) => {
      e.preventDefault();
      avatarContainer.classList.add('glitch');
      setTimeout(() => avatarContainer.classList.remove('glitch'), 400);
    });

    // ==========================================
    // MAGNETIC SOCIAL ICONS + CLICK COUNTERS
    // ==========================================
    const clickCounts = JSON.parse(localStorage.getItem('scene_clicks') || '{}');

    document.querySelectorAll('.social-link').forEach(link => {
      const name = link.getAttribute('data-name');
      const countEl = link.querySelector('.click-count');
      const tooltipName = link.getAttribute('data-tooltip');

      // Restore saved count
      if (clickCounts[name]) countEl.textContent = clickCounts[name];

      // Add tooltip
      const tooltip = document.createElement('span');
      tooltip.className = 'tooltip';
      tooltip.textContent = tooltipName;
      link.appendChild(tooltip);

      // Magnetic effect
      link.addEventListener('mousemove', (e) => {
        const rect = link.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = (e.clientX - cx) * 0.35;
        const dy = (e.clientY - cy) * 0.35;
        link.style.transform = `translate(${dx}px, ${dy}px) scale(1.15)`;
      });

      link.addEventListener('mouseleave', () => {
        link.style.transform = 'translate(0, 0) scale(1)';
      });

      // Click counter
      link.addEventListener('click', (e) => {
        e.preventDefault();
        clickCounts[name] = (clickCounts[name] || 0) + 1;
        countEl.textContent = clickCounts[name];
        localStorage.setItem('scene_clicks', JSON.stringify(clickCounts));

        // Pop animation
        link.classList.add('clicked');
        setTimeout(() => link.classList.remove('clicked'), 300);

        // +1 float
        const float = document.createElement('div');
        float.className = 'click-float';
        float.textContent = '+1';
        link.appendChild(float);
        float.addEventListener('animationend', () => float.remove());
      });
    });

    // ==========================================
    // PARALLAX BACKGROUND
    // ==========================================
    const videoBg = document.getElementById('videoBg');
    document.addEventListener('mousemove', (e) => {
      const mx = (e.clientX / window.innerWidth - 0.5) * 2;
      const my = (e.clientY / window.innerHeight - 0.5) * 2;
      videoBg.style.transform = `scale(1.08) translate(${mx * -12}px, ${my * -12}px)`;
    });

    // ==========================================
    // START SCREEN
    // ==========================================
    const startScreen = document.getElementById('startScreen');
    const mainContainer = document.getElementById('mainContainer');
    const elapsedEl = document.getElementById('elapsed');
    let startTime;

    startScreen.addEventListener('click', () => {
      startScreen.classList.add('hidden');
      videoBg.play();
      videoBg.classList.add('loaded');
      mainContainer.classList.add('visible');
      elapsedEl.classList.add('visible');
      startTime = Date.now();
      typeUsername();
      setTimeout(typeBio, 800);
      initParticles();
      updateElapsed();
      checkTwitchStatus();
    });

    // ==========================================
    // ELAPSED TIMER
    // ==========================================
    function updateElapsed() {
      setInterval(() => {
        const s = Math.floor((Date.now() - startTime) / 1000);
        const m = Math.floor(s / 60);
        const sec = s % 60;
        elapsedEl.textContent = String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
      }, 1000);
    }

    // ==========================================
    // TWITCH LIVE STATUS
    // ==========================================
    // Set your Twitch username here:
    const TWITCH_USERNAME = 'vans_it';

    async function checkTwitchStatus() {
      const statusEl = document.getElementById('liveStatus');
      const textEl = document.getElementById('liveText');

      // Using a free proxy to check if a Twitch channel is live
      // For production, use the Twitch API with your client ID
      try {
        const res = await fetch(`https://decapi.me/twitch/uptime/${TWITCH_USERNAME}`);
        const text = await res.text();

        if (text.includes('offline') || text.includes('not found')) {
          statusEl.className = 'live-status offline';
          textEl.textContent = 'Offline';
        } else {
          statusEl.className = 'live-status live';
          textEl.textContent = 'Live';
        }
      } catch {
        statusEl.className = 'live-status offline';
        textEl.textContent = 'Offline';
      }

      // Re-check every 60 seconds
      setTimeout(checkTwitchStatus, 60000);
    }

    // ==========================================
    // TYPEWRITER + NAME SHUFFLE
    // ==========================================
    const displayName = 'vans_it';
    const bioPhrases = [
      'STREAMER // CONTENT CREATOR',
      'LIVE ON TWITCH',
      'FOLLOW FOR MORE',
      'WELCOME TO THE SCENE'
    ];
    let bioIndex = 0;
    let bioShuffling = false;
    const usernameEl = document.getElementById('usernameText');
    const bioEl = document.getElementById('bio');
    const shuffleChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789//_!?@#$%&*';

    function typeUsername() {
      shuffleReveal(usernameEl, displayName, () => {
        // After reveal, keep shuffling periodically
        setInterval(() => {
          shuffleReveal(usernameEl, displayName);
        }, 8000);
      });
    }

    function shuffleReveal(el, text, onDone) {
      const len = text.length;
      const locked = new Array(len).fill(false);
      let iterations = 0;

      const interval = setInterval(() => {
        let result = '';
        for (let i = 0; i < len; i++) {
          if (locked[i]) {
            result += text[i];
          } else {
            result += shuffleChars[Math.floor(Math.random() * shuffleChars.length)];
          }
        }
        el.textContent = result;

        // Lock characters one by one from left to right
        if (iterations > 3) {
          const lockIndex = Math.floor((iterations - 3) / 2);
          if (lockIndex < len) locked[lockIndex] = true;
        }

        iterations++;

        if (locked.every(v => v)) {
          clearInterval(interval);
          el.textContent = text;
          if (onDone) onDone();
        }
      }, 40);
    }

    function shuffleBio(target, onDone) {
      if (bioShuffling) return;
      bioShuffling = true;
      const maxLen = Math.max(bioEl.textContent.length, target.length);
      let iterations = 0;
      const interval = setInterval(() => {
        bioEl.textContent = target.split('').map((char, idx) => {
          if (char === ' ') return ' ';
          if (idx < iterations) return target[idx];
          return shuffleChars[Math.floor(Math.random() * shuffleChars.length)];
        }).join('');
        if (iterations >= target.length) {
          clearInterval(interval);
          bioEl.textContent = target;
          bioShuffling = false;
          if (onDone) onDone();
        }
        iterations += 1/3;
      }, 35);
    }

    function typeBio() {
      shuffleBio(bioPhrases[0], () => {
        setInterval(() => {
          bioIndex = (bioIndex + 1) % bioPhrases.length;
          shuffleBio(bioPhrases[bioIndex]);
        }, 4000);
      });
    }

    // ==========================================
    // INTERACTIVE PARTICLES + CONNECTION LINES
    // ==========================================
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    const particlesArr = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function initParticles() {
      for (let i = 0; i < 30; i++) {
        particlesArr.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          size: Math.random() * 2.5 + 1
        });
      }
      animateParticles();
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particlesArr.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;

        // Mouse repulsion
        const dx = p.x - mouseX;
        const dy = p.y - mouseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        let drawX = p.x, drawY = p.y;

        if (dist < 150) {
          const force = (150 - dist) / 150;
          drawX += (dx / dist) * force * 50;
          drawY += (dy / dist) * force * 50;
        }

        // Mouse attraction at medium range
        if (dist > 150 && dist < 300) {
          const pull = (300 - dist) / 300 * 0.15;
          p.vx += (mouseX - p.x) * pull * 0.001;
          p.vy += (mouseY - p.y) * pull * 0.001;
        }

        // Speed limit
        const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        if (speed > 1.5) {
          p.vx *= 1.5 / speed;
          p.vy *= 1.5 / speed;
        }

        p.drawX = drawX;
        p.drawY = drawY;

        // Draw particle
        const opacity = 0.3 + Math.sin(Date.now() * 0.002 + p.x) * 0.2;
        ctx.beginPath();
        ctx.arc(drawX, drawY, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(139, 92, 246, ${opacity})`;
        ctx.fill();
      });

      // Draw connection lines between nearby particles (optimized with squared distance)
      const maxDist2 = 120 * 120;
      const maxMouseDist2 = 180 * 180;
      ctx.lineWidth = 0.5;

      for (let i = 0; i < particlesArr.length; i++) {
        const a = particlesArr[i];
        for (let j = i + 1; j < particlesArr.length; j++) {
          const b = particlesArr[j];
          const dx = a.drawX - b.drawX;
          const dy = a.drawY - b.drawY;
          const dist2 = dx * dx + dy * dy;

          if (dist2 < maxDist2) {
            const opacity = (1 - Math.sqrt(dist2) / 120) * 0.15;
            ctx.beginPath();
            ctx.moveTo(a.drawX, a.drawY);
            ctx.lineTo(b.drawX, b.drawY);
            ctx.strokeStyle = `rgba(139, 92, 246, ${opacity})`;
            ctx.stroke();
          }
        }

        // Draw lines from particle to cursor if close
        const dmx = a.drawX - mouseX;
        const dmy = a.drawY - mouseY;
        const dm2 = dmx * dmx + dmy * dmy;
        if (dm2 < maxMouseDist2) {
          const opacity = (1 - Math.sqrt(dm2) / 180) * 0.2;
          ctx.beginPath();
          ctx.moveTo(a.drawX, a.drawY);
          ctx.lineTo(mouseX, mouseY);
          ctx.strokeStyle = `rgba(167, 139, 250, ${opacity})`;
          ctx.stroke();
        }
      }

      requestAnimationFrame(animateParticles);
    }

    // ==========================================
    // VIEW COUNTER
    // ==========================================
    let views = parseInt(localStorage.getItem('scene_views') || '0');
    views++;
    localStorage.setItem('scene_views', views);
    document.getElementById('viewCount').textContent = views.toLocaleString();

    // ==========================================
    // AUDIO
    // ==========================================
    const audioBtn = document.getElementById('audioBtn');
    const bars = document.querySelectorAll('.audio-bar');
    let audioPlaying = false;
    // Add your audio file: const audio = new Audio('song.mp3');

    audioBtn.addEventListener('click', () => {
      audioPlaying = !audioPlaying;
      bars.forEach(bar => {
        bar.classList.toggle('active', audioPlaying);
        if (!audioPlaying) bar.style.height = '4px';
      });
      // audio.paused ? audio.play() : audio.pause();
    });
  </script>
</body>
