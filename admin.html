<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Songs">
  <link rel="manifest" href="/manifest.json">
  <title>Song Manager</title>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      padding-top: env(safe-area-inset-top, 20px);
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }
    .screen { display: none; width: 100%; max-width: 400px; }
    .screen.active { display: flex; flex-direction: column; align-items: center; }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #333;
      border-radius: 12px;
      background: #1a1a1a;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #666; }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #fff;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.7; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
    }
    .gap { margin-top: 12px; }
    .song-list {
      width: 100%;
      list-style: none;
      margin-top: 16px;
    }
    .song-list li {
      padding: 12px 16px;
      background: #1a1a1a;
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 14px;
      color: #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .song-list li .num {
      color: #666;
      font-size: 12px;
    }
    .upload-area {
      width: 100%;
      padding: 40px 20px;
      border: 2px dashed #333;
      border-radius: 16px;
      text-align: center;
      color: #666;
      margin-top: 16px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .upload-area.drag { border-color: #fff; color: #fff; }
    .upload-area .icon { font-size: 32px; margin-bottom: 8px; }
    .upload-area p { font-size: 14px; }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #1a1a1a;
      border-radius: 2px;
      margin-top: 16px;
      overflow: hidden;
      display: none;
    }
    .progress-bar .fill {
      height: 100%;
      background: #fff;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s;
    }
    .status {
      font-size: 13px;
      color: #888;
      margin-top: 12px;
      text-align: center;
      min-height: 18px;
    }
    .error { color: #ff4444; }
    .success { color: #44ff44; }
    .file-info {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a1a;
      border-radius: 10px;
      margin-top: 12px;
      font-size: 14px;
      color: #ccc;
      display: none;
    }
    .file-info .name { font-weight: 500; color: #fff; }
    .file-info .size { color: #666; font-size: 12px; }
    .input-group { width: 100%; margin-top: 12px; }
    .input-group label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
      padding-left: 4px;
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login" class="screen active">
    <h1>Song Manager</h1>
    <input type="password" id="pwd" placeholder="Password" autocomplete="off">
    <button class="gap" id="loginBtn" onclick="login()">Sign In</button>
    <div class="status" id="loginStatus"></div>
  </div>

  <!-- Main Screen -->
  <div id="main" class="screen">
    <h1>Add Song</h1>

    <div class="upload-area" id="dropZone" onclick="filePicker.click()">
      <div class="icon">+</div>
      <p>Tap to select MP3</p>
    </div>
    <input type="file" id="filePicker" accept=".mp3,audio/mpeg" style="display:none" onchange="fileSelected(this.files[0])">

    <div class="file-info" id="fileInfo">
      <div class="name" id="fileName"></div>
      <div class="size" id="fileSize"></div>
    </div>

    <div class="input-group">
      <label>Song label (e.g. Artist - Title)</label>
      <input type="text" id="songLabel" placeholder="Artist - Song Title">
    </div>

    <button class="gap" id="uploadBtn" onclick="upload()" disabled>Upload Song</button>

    <div class="progress-bar" id="progressBar">
      <div class="fill" id="progressFill"></div>
    </div>
    <div class="status" id="uploadStatus"></div>

    <ul class="song-list" id="songList"></ul>

    <button class="btn-secondary gap" onclick="loadSongs()" style="margin-top:24px">Refresh Song List</button>
  </div>

<script>
  const API_BASE = 'https://api.github.com';
  let ghToken = '';
  let ghRepo = '';
  let selectedFile = null;
  const filePicker = document.getElementById('filePicker');
  const dropZone = document.getElementById('dropZone');

  // Enter key submits login
  document.getElementById('pwd').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  // Drag and drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.mp3')) fileSelected(file);
  });

  async function login() {
    const pwd = document.getElementById('pwd').value;
    const status = document.getElementById('loginStatus');
    const btn = document.getElementById('loginBtn');
    if (!pwd) return;

    btn.disabled = true;
    status.textContent = 'Signing in...';
    status.className = 'status';

    try {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || 'Wrong password');
      }
      const data = await res.json();
      ghToken = data.token;
      ghRepo = data.repo;
      document.getElementById('login').classList.remove('active');
      document.getElementById('main').classList.add('active');
      loadSongs();
    } catch (e) {
      status.textContent = e.message;
      status.className = 'status error';
      btn.disabled = false;
    }
  }

  function fileSelected(file) {
    if (!file) return;
    selectedFile = file;
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileSize').textContent = (file.size / (1024 * 1024)).toFixed(1) + ' MB';
    document.getElementById('fileInfo').style.display = 'block';
    document.getElementById('uploadBtn').disabled = false;

    // Auto-fill label from filename if empty
    const label = document.getElementById('songLabel');
    if (!label.value) {
      label.value = file.name.replace(/\.mp3$/i, '').replace(/[-_]/g, ' ');
    }
  }

  function setProgress(pct) {
    const bar = document.getElementById('progressBar');
    const fill = document.getElementById('progressFill');
    bar.style.display = 'block';
    fill.style.width = pct + '%';
  }

  function setStatus(msg, type) {
    const el = document.getElementById('uploadStatus');
    el.textContent = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  async function ghFetch(path, opts = {}) {
    const res = await fetch(API_BASE + path, {
      ...opts,
      headers: {
        'Authorization': 'Bearer ' + ghToken,
        'Accept': 'application/vnd.github.v3+json',
        ...(opts.headers || {}),
      },
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || 'GitHub API error ' + res.status);
    }
    return res.json();
  }

  async function loadSongs() {
    try {
      const data = await ghFetch(`/repos/${ghRepo}/contents/index.html`);
      const html = atob(data.content.replace(/\n/g, ''));
      const match = html.match(/const songs = \[([\s\S]*?)\];/);
      if (!match) return;

      const list = document.getElementById('songList');
      list.innerHTML = '';

      const entries = match[1].match(/'([^']+)'/g);
      if (entries) {
        entries.forEach((entry, i) => {
          const filename = entry.replace(/'/g, '');
          // Try to extract the comment/label
          const lineMatch = match[1].match(new RegExp(entry + ".*?//\\s*(.*)"));
          const label = lineMatch ? lineMatch[1].trim() : filename;

          const li = document.createElement('li');
          li.innerHTML = `<span>${label}</span><span class="num">${filename}</span>`;
          list.appendChild(li);
        });
      }
    } catch (e) {
      console.error('Failed to load songs:', e);
    }
  }

  async function upload() {
    if (!selectedFile) return;
    const btn = document.getElementById('uploadBtn');
    btn.disabled = true;

    try {
      // 1. Determine next song number
      setStatus('Checking existing songs...', '');
      setProgress(10);

      let existingFiles;
      try {
        existingFiles = await ghFetch(`/repos/${ghRepo}/contents/`);
      } catch (e) {
        throw new Error('Failed to list repo files');
      }

      const songFiles = existingFiles
        .filter(f => /^song\d+\.mp3$/.test(f.name))
        .map(f => parseInt(f.name.match(/\d+/)[0]));
      const nextNum = songFiles.length > 0 ? Math.max(...songFiles) + 1 : 1;
      const newFilename = `song${nextNum}.mp3`;

      // 2. Read file as base64
      setStatus('Reading file...', '');
      setProgress(20);
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(selectedFile);
      });

      // 3. Upload MP3 to repo
      setStatus('Uploading MP3...', '');
      setProgress(40);
      const label = document.getElementById('songLabel').value.trim() || selectedFile.name.replace(/\.mp3$/i, '');

      await ghFetch(`/repos/${ghRepo}/contents/${newFilename}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: `Add ${newFilename} (${label})`,
          content: base64,
        }),
      });

      // 4. Update index.html songs array
      setStatus('Updating song list...', '');
      setProgress(70);

      const indexData = await ghFetch(`/repos/${ghRepo}/contents/index.html`);
      const indexContent = atob(indexData.content.replace(/\n/g, ''));

      const newEntry = `  '${newFilename}',   // ${label}`;
      const updated = indexContent.replace(
        /(const songs = \[[\s\S]*?)(\/\/ 'song\d+\.mp3'.*?\n|(\s*)\];)/,
        (match, before, ending) => {
          if (ending.trim() === '];') {
            // Add before the closing bracket
            return before + newEntry + '\n  ];';
          }
          return before + newEntry + '\n  ' + ending;
        }
      );

      // If the simple replace didn't work, try a more direct approach
      let finalContent = updated;
      if (!updated.includes(newFilename)) {
        finalContent = indexContent.replace(
          /const songs = \[([\s\S]*?)\];/,
          (match, inner) => {
            const trimmed = inner.trimEnd();
            return `const songs = [${trimmed}\n  '${newFilename}',   // ${label}\n];`;
          }
        );
      }

      setProgress(85);
      await ghFetch(`/repos/${ghRepo}/contents/index.html`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: `Add ${newFilename} to songs array`,
          content: btoa(unescape(encodeURIComponent(finalContent))),
          sha: indexData.sha,
        }),
      });

      setProgress(100);
      setStatus(`Uploaded ${newFilename} — deploying now!`, 'success');

      // Reset form
      selectedFile = null;
      document.getElementById('fileInfo').style.display = 'none';
      document.getElementById('songLabel').value = '';
      filePicker.value = '';
      btn.disabled = true;

      // Refresh song list
      setTimeout(loadSongs, 1000);

    } catch (e) {
      setStatus('Error: ' + e.message, 'error');
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
